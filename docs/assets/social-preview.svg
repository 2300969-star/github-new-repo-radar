<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="760" viewBox="0 0 1520 760" role="img" aria-labelledby="title desc">
  <title id="title">GitHub New Repo Radar</title>
  <desc id="desc">A visual banner for a CLI that finds and analyzes newly-created GitHub repositories.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f2e8"/>
      <stop offset="1" stop-color="#e7ddca"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="0.55" stop-color="#2459a6"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#4b3f2f" flood-opacity="0.18"/>
    </filter>
    <filter id="buttonShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#18211f" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1520" height="760" fill="url(#paper)"/>
  <rect x="72" y="70" width="1376" height="620" rx="34" fill="#fffaf1" opacity="0.72"/>

  <g transform="translate(150 160)" filter="url(#softShadow)">
    <rect x="0" y="0" width="330" height="330" rx="76" fill="url(#screen)"/>
    <circle cx="98" cy="86" r="15" fill="#dff0e7"/>
    <circle cx="144" cy="86" r="15" fill="#dce7f7"/>
    <circle cx="190" cy="86" r="15" fill="#f7e8b6"/>
    <rect x="58" y="130" width="214" height="22" rx="11" fill="#fffaf1" opacity="0.9"/>
    <rect x="58" y="176" width="142" height="22" rx="11" fill="#fffaf1" opacity="0.62"/>
    <rect x="58" y="222" width="176" height="22" rx="11" fill="#fffaf1" opacity="0.78"/>
    <path d="M264 220 L292 248 L264 276" fill="none" stroke="#fffaf1" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="165" y="310" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="800" fill="#fffaf1">new repos</text>
  </g>

  <g transform="translate(560 160)">
    <text x="0" y="42" font-family="Inter, Arial, sans-serif" font-size="44" font-weight="800" fill="#c2410c">GitHub New Repo Radar</text>
    <text x="0" y="132" font-family="Inter, Arial, 'PingFang SC', sans-serif" font-size="70" font-weight="900" fill="#211b14">只看今天新建项目</text>
    <text x="0" y="202" font-family="Inter, Arial, 'PingFang SC', sans-serif" font-size="44" font-weight="800" fill="#5c5144">排除旧项目更新，把热度变成项目解析</text>

    <g transform="translate(0 248)" font-family="Inter, Arial, 'PingFang SC', sans-serif" font-size="28" font-weight="800" fill="#fffaf1" filter="url(#buttonShadow)">
      <rect x="0" y="0" width="180" height="54" rx="27" fill="#0f766e"/>
      <text x="90" y="36" text-anchor="middle">created_at</text>
      <rect x="202" y="0" width="136" height="54" rx="27" fill="#2459a6"/>
      <text x="270" y="36" text-anchor="middle">HTML</text>
      <rect x="360" y="0" width="126" height="54" rx="27" fill="#a16207"/>
      <text x="423" y="36" text-anchor="middle">JSON</text>
      <rect x="508" y="0" width="158" height="54" rx="27" fill="#b42318"/>
      <text x="587" y="36" text-anchor="middle">risk scan</text>
      <rect x="688" y="0" width="132" height="54" rx="27" fill="#287451"/>
      <text x="754" y="36" text-anchor="middle">LLM</text>
    </g>

    <text x="0" y="395" font-family="Inter, Arial, 'PingFang SC', sans-serif" font-size="31" font-weight="700" fill="#6b5f50">GitHub Search API · README analysis · zero dependencies · server-ready CLI</text>
  </g>
</svg>
